apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/name: argocd-notifications-controller
    app.kubernetes.io/part-of: argocd
data:
  # Webhook service — sends to LangGraph KAO ingest
  service.webhook.langgraph: |
    url: http://10.20.0.40:30800/ingest?source=argocd
    headers:
      - name: Content-Type
        value: application/json

  # Default triggers — applied to ALL apps without individual annotations
  defaultTriggers: |
    - on-sync-failed
    - on-health-degraded

  # Trigger definitions
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [health-degraded]

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [sync-succeeded]

  # Templates
  template.sync-failed: |
    webhook:
      langgraph:
        method: POST
        body: |
          {
            "alert_name": "ArgoCD Sync Failed: {{.app.metadata.name}}",
            "severity": "critical",
            "description": "Application {{.app.metadata.name}} sync failed. Phase: {{.app.status.operationState.phase}}. Message: {{.app.status.operationState.message}}",
            "fingerprint": "argocd-sync-failed-{{.app.metadata.name}}",
            "labels": {
              "app": "{{.app.metadata.name}}",
              "namespace": "{{.app.spec.destination.namespace}}",
              "cluster": "{{.app.spec.destination.server}}",
              "sync_status": "{{.app.status.sync.status}}",
              "health_status": "{{.app.status.health.status}}"
            }
          }

  template.health-degraded: |
    webhook:
      langgraph:
        method: POST
        body: |
          {
            "alert_name": "ArgoCD Health Degraded: {{.app.metadata.name}}",
            "severity": "warning",
            "description": "Application {{.app.metadata.name}} health is Degraded in namespace {{.app.spec.destination.namespace}}",
            "fingerprint": "argocd-health-degraded-{{.app.metadata.name}}",
            "labels": {
              "app": "{{.app.metadata.name}}",
              "namespace": "{{.app.spec.destination.namespace}}",
              "cluster": "{{.app.spec.destination.server}}",
              "health_status": "{{.app.status.health.status}}"
            }
          }

  template.sync-succeeded: |
    webhook:
      langgraph:
        method: POST
        body: |
          {
            "alert_name": "ArgoCD Sync OK: {{.app.metadata.name}}",
            "severity": "info",
            "description": "Application {{.app.metadata.name}} synced successfully to revision {{.app.status.sync.revision}}",
            "fingerprint": "argocd-sync-ok-{{.app.metadata.name}}",
            "labels": {
              "app": "{{.app.metadata.name}}",
              "namespace": "{{.app.spec.destination.namespace}}",
              "cluster": "{{.app.spec.destination.server}}",
              "sync_status": "{{.app.status.sync.status}}",
              "health_status": "{{.app.status.health.status}}"
            }
          }
