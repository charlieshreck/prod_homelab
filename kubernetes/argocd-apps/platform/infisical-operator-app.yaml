apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  sources:
    # Helm chart for Infisical Kubernetes Operator
    - repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
      chart: secrets-operator
      targetRevision: 0.10.28
      helm:
        releaseName: infisical-operator
        values: |
          controllerManager:
            manager:
              # Disable leader election: single replica only, avoids crash-loop on transient API blips
              args:
                - --metrics-bind-address=:8443
                - --leader-elect=false
                - --health-probe-bind-address=:8081
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
    # Git repository for additional resources (auth secret)
    - repoURL: https://github.com/charlieshreck/prod_homelab.git
      targetRevision: main
      path: kubernetes/platform/infisical/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
