apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  sources:
    # Helm chart for Infisical Kubernetes Operator
    - repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
      chart: secrets-operator
      targetRevision: 0.10.2
      helm:
        releaseName: infisical-operator
        values: |
          manager:
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 1000m
                memory: 256Mi
            livenessProbe:
              timeoutSeconds: 5
              failureThreshold: 3
              periodSeconds: 20
            readinessProbe:
              timeoutSeconds: 5
              failureThreshold: 3
              periodSeconds: 10
    # Git repository for additional resources (auth secret)
    - repoURL: https://github.com/charlieshreck/prod_homelab.git
      targetRevision: main
      path: kubernetes/platform/infisical/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
